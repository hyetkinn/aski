<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sayfa bulunamadı — ASKİ (taslak)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <script>
      (function () {
        var t = localStorage.getItem("theme");
        if (t === "dark" || (t !== "light" && window.matchMedia("(prefers-color-scheme: dark)").matches))
          document.documentElement.setAttribute("data-theme", "dark");
      })();
    </script>
  </head>
  <body class="page-404">
    <button type="button" class="theme-toggle theme-toggle--fab" data-theme-toggle aria-label="Karanlık temayı aç" title="Görünüm">
      <span class="theme-toggle__icon theme-toggle__icon--moon" aria-hidden="true">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </span>
      <span class="theme-toggle__icon theme-toggle__icon--sun" aria-hidden="true" hidden>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      </span>
    </button>
    <main class="error-404">
      <div class="error-404__card">
        <img class="error-404__logo" src="askilogo.jpeg" width="96" height="96" alt="ASKİ" />
        <p class="error-404__code">404</p>
        <h1 class="error-404__title">Sayfa bulunamadı</h1>
        <p class="error-404__text">
          Bu adreste bir içerik yok veya bağlantı güncellenmiş olabilir. Bu sayfa UI/UX prototipinde de çalışmamaktadır; yalnızca hata durumu için gösterilir.
        </p>
        <div class="error-404__actions">
          <a class="btn btn--primary" href="index.html">Ana sayfaya dön</a>
          <a class="btn btn--ghost" href="esube.html">E-Şube</a>
        </div>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
